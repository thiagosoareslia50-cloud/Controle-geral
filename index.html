<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controladoria Geral — Gov. Edison Lobão / MA</title>
  <meta name="description" content="Sistema de Controle de Processos de Pagamento" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Reset base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; width: 100%; }
    body {
      height: 100%; width: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f2f4f7;
      overflow-x: hidden;
    }
    #root { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
    #root > div { width: 100%; flex: 1; }
    #loading-screen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #006000 0%, #003d00 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 16px;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hide { opacity: 0; pointer-events: none; }
    .ld-brasao-placeholder {
      width: 88px; height: 88px; border-radius: 50%;
      background: rgba(239,209,3,.12); border: 2px solid rgba(239,209,3,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
    }
    .ld-spinner {
      width: 34px; height: 34px;
      border: 3px solid rgba(239,209,3,.18);
      border-top-color: #EFD103;
      border-radius: 50%;
      animation: ld-spin .75s linear infinite;
    }
    @keyframes ld-spin { to { transform: rotate(360deg); } }
    .ld-title { font-size: 13px; font-weight: 800; color: #EFD103; letter-spacing: .08em; text-transform: uppercase; }
    .ld-sub { font-size: 11px; color: rgba(255,255,255,.4); text-align: center; line-height: 1.5; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2d40; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #2d4060; }
      @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
      .ld-brasao {
      width: 88px; height: 88px;
      object-fit: contain;
      animation: ld-pulse 2s ease-in-out infinite;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,.5));
    }
    @keyframes ld-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: .88; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div id="ld-icon" class="ld-brasao-placeholder">🏛️</div>
    <div class="ld-title">Controladoria Geral</div>
    <div class="ld-sub">Prefeitura Municipal de Gov. Edison Lobão / MA</div>
    <div class="ld-spinner"></div>
    <div class="ld-sub">Carregando sistema...</div>
  </div>
  <div id="root"></div>

  <!-- Legacy Support (Moved to public for Vite) -->
  <script src="/brasao.js"></script>

  <!-- Vite Entry -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
